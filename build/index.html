<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Font End Dev.</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>

	<!-- Navbar -->
	<div>
		<nav id="navbar">
			<div id="nav-title">Frontend.dev</div>
			<ul id="nav-items">
				<li><a href="#hero" class="nav-link active">Home</a></li>
				<li><a href="#skills" class="nav-link">Skills</a></li>
				<li><a href="#projects" class="nav-link">Projects</a></li>
				<li><a href="#contact" class="nav-link">Contact</a></li>
			</ul>
			<div id="nav-toggler">
				<div class="hamburger-icon line1"></div>
				<div class="hamburger-icon line2"></div>
				<div class="hamburger-icon line3"></div>
			</div>
		</nav>
		<ul id="nav-items-for-mobile">
			<li><a href="#hero" class="mov-nav-link active">Home</a></li>
			<li><a href="#skills" class="mov-nav-link">Skills</a></li>
			<li><a href="#projects" class="mov-nav-link">Projects</a></li>
			<li><a href="#contact" class="mov-nav-link">Contact</a></li>
		</ul>
	</div>
	<!-- /Navbar -->

	<!-- Hero -->

	<div id="hero">
		<div id="hero-img">
			<img src="./img/hero.jpg" alt="Hero Image">
		</div>
		<div id="hero-text">
			Hi there i am Hussain Ahmed. A Frontend Web Developer.
		</div>
	</div>

	<!-- /Hero -->

	<div class="section-divider"></div>

	<!-- Skills -->

	<div id="skills">
		<div id="skills-header">My Skills</div>
		<div class="skill-item">
			<div class="skill-title html">HTML</div>
			<img src="./img/html.png" alt="" class="skill-img">
		</div>
		<div class="skill-item">
			<div class="skill-title css">CSS</div>
			<img src="./img/css.png" alt="" class="skill-img">
		</div>
		<div class="skill-item">
			<div class="skill-title javascript">JavaScript</div>
			<img src="./img/javascript.png" alt="" class="skill-img">
		</div>
		<div class="skill-item">
			<div class="skill-title bootstrap">Bootstrap 5</div>
			<img src="./img/bootstrap.png" alt="" class="skill-img">
		</div>
		<div class="skill-item">
			<div class="skill-title tailwind">Tailwind CSS</div>
			<img src="./img/tailwind.png" alt="" class="skill-img">
		</div>
	</div>

	<!-- /Skills -->

	<div class="section-divider"></div>

	<!-- Projects -->

	<div id="projects">
		<div id="projects-header">Projects</div>
		<div id="small-projects">
		</div>
	</div>

	<!-- /Projects -->

	<div class="section-divider"></div>

	<!-- contact -->

	<!-- /contact -->

	<!-- footer -->
		<div id="footer">
			<div id="copyright">Copyright &copy; <span id="date"></span></div>
			<div id="author">
				- Hussain Ahmed
			</div>
		</div>
	<!-- /footer -->

	<script src="./js/app.js"></script>
</body>

</html>
